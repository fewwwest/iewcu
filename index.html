<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>植物志</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #080c12;
  --panel:   #0c1218;
  --border:  #182430;
  --text:    #6888a0;
  --light:   #a8c0d0;
  --accent:  #3a6888;
  --gold:    #a89040;
  --dim:     #283848;
  --cv-bg:   #04080c;
  --btn:     #101820;
  --btn-h:   #182838;
  --dot-off: #0c1820;
  --dot-on:  #285878;
  --dot-now: #3a6888;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 12px 48px;
}
.wrap {
  width: 100%;
  max-width: 340px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.hdr {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--border);
}
.title { color: var(--light); font-size: 9px; letter-spacing: 1px; }
.sub   { color: var(--dim); font-size: 5px; letter-spacing: 2px; }
.sid-row { display: flex; gap: 6px; }
#sidInput {
  flex: 1;
  background: var(--panel);
  border: 2px solid var(--border);
  color: var(--light);
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  padding: 7px 8px;
  outline: none;
  letter-spacing: 2px;
}
#sidInput:focus { border-color: var(--accent); }
#sidInput::placeholder { color: var(--dim); letter-spacing: 0; }
#sidInput.shake { animation: shake .28s; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  30%     { transform: translateX(-5px); }
  70%     { transform: translateX(5px); }
}
.sid-hint { font-size: 5px; letter-spacing: 1px; margin-top: 5px; min-height: 10px; color: var(--dim); }
.sid-hint.ok { color: var(--accent); }
.btn {
  background: var(--btn);
  border: 2px solid var(--border);
  color: var(--text);
  font-family: 'Press Start 2P', monospace;
  font-size: 6px;
  padding: 6px 10px;
  cursor: pointer;
  white-space: nowrap;
  transition: background .1s, color .1s;
}
.btn:hover { background: var(--btn-h); color: var(--light); }
.btn:active { filter: brightness(.8); }
.btn.primary {
  width: 100%; padding: 10px;
  font-size: 7px;
  background: var(--accent);
  border-color: var(--accent);
  color: #d8ecf8;
}
.btn.primary:hover { background: #4a7898; }
.btn.primary:disabled {
  background: var(--btn);
  border-color: var(--border);
  color: var(--dim);
  cursor: default;
}
.btn.test {
  background: #0a100a; border-color: #182018;
  color: #405040; font-size: 5px; padding: 5px 8px;
}
.btn.test:hover { color: #607060; }
.btn.danger {
  background: #100a0a; border-color: #201818;
  color: #604040; font-size: 5px; padding: 5px 8px;
}
.btn.danger:hover { color: #c07070; }
.garden {
  background: var(--panel);
  border: 2px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 16px 12px;
  gap: 10px;
}
#plantCanvas {
  width: 240px; height: 240px;
  image-rendering: pixelated;
  background: var(--cv-bg);
  display: block;
}
.stage-name {
  color: var(--gold);
  font-size: 7px;
  letter-spacing: 4px;
}
.stats {
  display: flex;
  justify-content: space-around;
  padding: 8px 0;
  border-top: 2px solid var(--border);
  border-bottom: 2px solid var(--border);
}
.stat { text-align: center; }
.stat-v { color: var(--light); font-size: 11px; display: block; margin-bottom: 5px; }
.stat-l { color: var(--dim); font-size: 5px; letter-spacing: 1px; }
.cal-lbl {
  color: var(--dim); font-size: 5px; letter-spacing: 2px;
  margin-bottom: 7px;
}
#calGrid {
  display: grid;
  grid-template-rows: repeat(7, 6px);
  grid-auto-flow: column;
  grid-auto-columns: 6px;
  gap: 2px;
}
.cc { background: var(--dot-off); }
.cc.c { background: var(--dot-on); }
.cc.t { outline: 1px solid var(--dot-now); outline-offset: 1px; }
.cc.f { opacity: 0.15; }
.test-bar {
  display: flex; gap: 6px; align-items: center;
  border-top: 1px dashed var(--border);
  padding-top: 10px;
}
.test-lbl { color: var(--border); font-size: 5px; margin-right: auto; }
#notif {
  position: fixed; top: 16px; left: 50%;
  transform: translateX(-50%) translateY(-48px);
  background: var(--accent); color: #d8ecf8;
  font-family: 'Press Start 2P', monospace; font-size: 7px;
  padding: 8px 16px; border: 2px solid #5a98c0;
  z-index: 100; pointer-events: none;
  transition: transform .2s cubic-bezier(.2,.9,.3,1);
}
#notif.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="notif">打卡成功</div>
<div class="wrap">

  <div class="hdr">
    <span class="title">植物志</span>
    <span class="sub">PLANT CODEX</span>
  </div>

  <div>
    <div class="sid-row">
      <input id="sidInput" type="text" inputmode="numeric" maxlength="11"
             placeholder="11 位学号" autocomplete="off">
      <button class="btn" onclick="setSID()">确认</button>
    </div>
    <div id="sidHint" class="sid-hint">&nbsp;</div>
  </div>

  <div class="garden">
    <canvas id="plantCanvas" width="80" height="80"></canvas>
    <div class="stage-name" id="stageName">···</div>
  </div>

  <button class="btn primary" id="checkinBtn" onclick="checkin()" disabled>今日打卡</button>

  <div class="stats">
    <div class="stat">
      <span class="stat-v" id="daysVal">—</span>
      <span class="stat-l">陪伴天数</span>
    </div>
    <div class="stat">
      <span class="stat-v" id="ciVal">—</span>
      <span class="stat-l">打卡次数</span>
    </div>
    <div class="stat">
      <span class="stat-v" id="hlthVal">—</span>
      <span class="stat-l">活跃度</span>
    </div>
  </div>

  <div>
    <div class="cal-lbl">打卡记录</div>
    <div id="calGrid"></div>
  </div>

  <div class="test-bar">
    <span class="test-lbl">TEST</span>
    <button class="btn test" onclick="nextDay()">+1 天</button>
    <button class="btn danger" id="resetBtn" onclick="handleReset()">重置</button>
  </div>

</div>
<script>
const LEAF_PALETTES = [
  { d:'#2a1848', m:'#6030a0', l:'#c078e8' },
  { d:'#183848', m:'#288898', l:'#58c8d8' },
  { d:'#483010', m:'#987820', l:'#d8b840' },
  { d:'#481828', m:'#983058', l:'#d87888' },
  { d:'#182840', m:'#2858a0', l:'#58a0d8' },
  { d:'#184830', m:'#289060', l:'#58d898' },
  { d:'#304818', m:'#609028', l:'#98d058' },
  { d:'#482818', m:'#985028', l:'#d09058' },
];
const TRUNK_COLS = [
  '#688090','#609068','#806868','#887060',
  '#687098','#609888','#706090','#887870',
  '#887068','#609098','#706878','#707098',
];
const FLOWER_COLS = ['#ff9898','#ffda80','#90d8ff','#d090ff','#90ffcc','#ffaacc'];

const STAGE_NAMES  = ['休眠','破土','嫩芽','初枝','繁茂','葱茏','参天','古木','永恒'];
const STAGE_THRESH = [0, 4, 10, 20, 34, 52, 76, 106, 140];
const BRANCH_FRACS = [
  [],[],
  [0.65],
  [0.50, 0.80],
  [0.40, 0.62, 0.83],
  [0.32, 0.50, 0.67, 0.84],
  [0.28, 0.43, 0.57, 0.70, 0.85],
  [0.24, 0.38, 0.51, 0.63, 0.75, 0.88],
  [0.20, 0.32, 0.44, 0.55, 0.65, 0.75, 0.85, 0.93],
];
const TRUNK_H = [0, 5, 10, 16, 22, 28, 35, 42, 50];

function hash32(s) {
  let h = 0x811c9dc5 >>> 0;
  for (const c of String(s)) { h ^= c.charCodeAt(0); h = Math.imul(h, 0x01000193) >>> 0; }
  return h;
}
function seededRng(seed) {
  let s = seed >>> 0;
  return () => {
    s = ((s + 0x6D2B79F5) | 0) >>> 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = t + Math.imul(t ^ (t >>> 7), 61 | t) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function parseID(sid) {
  if (!/^\d{11}$/.test(sid)) return null;
  const year = parseInt(sid.slice(0, 4));
  const major = sid.slice(4, 8);
  const num   = sid.slice(8, 11);
  return {
    year, major, num,
    leafIdx:   ((year - 2018) % 8 + 8) % 8,
    trunkIdx:  hash32(major) % TRUNK_COLS.length,
    flowerIdx: hash32(num)   % FLOWER_COLS.length,
  };
}

function getGenome(sid) {
  const p = parseID(sid);
  if (!p) return null;
  const rng = seededRng(hash32(sid));
  return {
    leaf:      LEAF_PALETTES[p.leafIdx],
    trunk:     TRUNK_COLS[p.trunkIdx],
    flower:    FLOWER_COLS[p.flowerIdx],
    leafStyle: Math.floor(rng() * 3),
    leafExtra: rng() > 0.45,
    branchAng: (30 + rng() * 22) * Math.PI / 180,
  };
}

const K = { sid:'pp_sid', ci:'pp_ci', off:'pp_off', fd:'pp_fd' };
function getOff()  { return parseInt(localStorage.getItem(K.off) || '0'); }
function getToday() {
  const d = new Date(); d.setDate(d.getDate() + getOff());
  return d.toISOString().slice(0, 10);
}
function getCIs() {
  try { return JSON.parse(localStorage.getItem(K.ci) || '[]'); } catch { return []; }
}

function calcGrowth(cis) {
  const today = getToday();
  let fd = localStorage.getItem(K.fd);
  if (!fd) { fd = today; localStorage.setItem(K.fd, fd); }
  const days  = Math.max(0, Math.round((new Date(today) - new Date(fd)) / 86400000));
  const total = cis.length;
  const score = days * 0.6 + total * 1.2;
  let stage = 0;
  for (let i = STAGE_THRESH.length - 1; i >= 0; i--)
    if (score >= STAGE_THRESH[i]) { stage = i; break; }
  const health = days > 0 ? Math.min(1, total / days) : total > 0 ? 1 : 0;
  return { days, total, score, stage, health };
}

const CV = document.getElementById('plantCanvas');
const CX = CV.getContext('2d');
CX.imageSmoothingEnabled = false;

function dot(x, y, col) {
  if (x < 0 || x >= 80 || y < 0 || y >= 80) return;
  CX.fillStyle = col; CX.fillRect(x, y, 1, 1);
}

function drawShape(cx, cy, r, style, col) {
  if (r < 1) return;
  if (style === 0) {
    for (let dy = -r; dy <= r; dy++)
      for (let dx = -(r - Math.abs(dy)); dx <= r - Math.abs(dy); dx++)
        dot(cx+dx, cy+dy, col);
  } else if (style === 1) {
    for (let dy = -r; dy <= r; dy++)
      for (let dx = -r; dx <= r; dx++)
        if (dx*dx + dy*dy <= r*r) dot(cx+dx, cy+dy, col);
  } else {
    for (let dy = -r; dy <= r; dy++)
      for (let dx = -r; dx <= r; dx++)
        dot(cx+dx, cy+dy, col);
  }
}

function drawCluster(cx, cy, r, g, health) {
  if (r < 1) return;
  const s = g.leafStyle;
  drawShape(cx, cy, r, s, g.leaf.d);
  if (health >= 0.20 && r >= 2) drawShape(cx, cy, r-1, s, g.leaf.m);
  if (health >= 0.50 && r >= 3) drawShape(cx, cy, r-2, s, g.leaf.l);
  if (health >= 0.50 && r >= 2) dot(cx-1, cy-r+1, g.leaf.l);
}

function drawFlower(cx, cy, col) {
  for (let i = -1; i <= 1; i++) { dot(cx+i, cy, col); dot(cx, cy+i, col); }
  dot(cx+1, cy-1, col); dot(cx-1, cy-1, col);
}

function drawLine(x0, y0, x1, y1, col) {
  let dx = Math.abs(x1-x0), sx = x0 < x1 ? 1 : -1;
  let dy = -Math.abs(y1-y0), sy = y0 < y1 ? 1 : -1;
  let err = dx + dy;
  for (let i = 0; i < 120; i++) {
    dot(x0, y0, col);
    if (x0 === x1 && y0 === y1) break;
    const e2 = 2 * err;
    if (e2 >= dy) { err += dy; x0 += sx; }
    if (e2 <= dx) { err += dx; y0 += sy; }
  }
}

function drawPlant(sid, stage, health) {
  CX.clearRect(0, 0, 80, 80);
  const g = getGenome(sid);
  if (!g) {
    CX.fillStyle = '#182028';
    for (let y = 28; y <= 52; y += 8)
      for (let x = 28; x <= 52; x += 8)
        CX.fillRect(x, y, 4, 4);
    return;
  }

  const GX = 40, GY = 74;
  CX.fillStyle = '#080c10'; CX.fillRect(0, GY, 80, 6);
  CX.fillStyle = '#101828'; CX.fillRect(GX-8, GY, 16, 1);

  if (stage === 0) {
    drawShape(GX, GY-2, 2, 0, g.trunk);
    dot(GX, GY-4, g.leaf.d);
    return;
  }

  const tH    = TRUNK_H[stage];
  const fracs = BRANCH_FRACS[stage];
  const leafR = Math.max(1, Math.floor(stage / 2));
  const ang   = g.branchAng;

  for (let i = 0; i < tH; i++) dot(GX, GY-i-1, g.trunk);
  const tipY = GY - tH;

  fracs.forEach((frac) => {
    const by   = GY - Math.round(tH * frac);
    const bLen = Math.max(3, Math.round((3 + leafR * 2.5) * (1 - frac * 0.35)));

    for (const side of [-1, 1]) {
      const tx = GX + side * Math.round(Math.cos(ang) * bLen);
      const ty = by  - Math.round(Math.sin(ang) * bLen);
      drawLine(GX, by, tx, ty, g.trunk);
      drawCluster(tx, ty, leafR, g, health);
      if (health >= 0.70 && stage >= 5)
        drawFlower(tx, ty - leafR - 1, g.flower);
      if (g.leafExtra && stage >= 4 && bLen > 5) {
        const mx = GX + side * Math.round(Math.cos(ang) * bLen * 0.5);
        const my = by  - Math.round(Math.sin(ang) * bLen * 0.5);
        drawCluster(mx, my, Math.max(1, leafR-1), g, health * 0.7);
      }
    }
  });

  const crownR = leafR + (health >= 0.45 ? 1 : 0);
  drawCluster(GX, tipY, crownR, g, health);
  if (health >= 0.82) drawFlower(GX, tipY - crownR - 1, g.flower);
}

function buildCalendar() {
  const grid    = document.getElementById('calGrid');
  grid.innerHTML = '';
  const today   = getToday();
  const checked = new Set(getCIs());
  const tDate   = new Date(today);
  const start   = new Date(tDate);
  start.setDate(start.getDate() - start.getDay() - 15 * 7);

  for (let w = 0; w < 16; w++) {
    for (let d = 0; d < 7; d++) {
      const cur = new Date(start);
      cur.setDate(cur.getDate() + w * 7 + d);
      const ds  = cur.toISOString().slice(0, 10);
      const cell = document.createElement('div');
      cell.className = 'cc';
      if (checked.has(ds)) cell.classList.add('c');
      if (ds === today)    cell.classList.add('t');
      if (ds > today)      cell.classList.add('f');
      grid.appendChild(cell);
    }
  }
}

function checkin() {
  const today = getToday();
  const arr   = getCIs();
  if (arr.includes(today)) return;
  if (!localStorage.getItem(K.fd)) localStorage.setItem(K.fd, today);
  arr.push(today);
  localStorage.setItem(K.ci, JSON.stringify(arr));
  showNotif();
  refresh();
}

function refresh() {
  const sid   = localStorage.getItem(K.sid) || '';
  const valid = /^\d{11}$/.test(sid);
  document.getElementById('sidInput').value = sid;
  const cis   = getCIs();
  const today = getToday();

  if (valid) {
    const parsed = parseID(sid);
    const { days, total, stage, health } = calcGrowth(cis);
    document.getElementById('stageName').textContent = STAGE_NAMES[stage];
    document.getElementById('daysVal').textContent   = days;
    document.getElementById('ciVal').textContent     = total;
    document.getElementById('hlthVal').textContent   = Math.round(health * 100) + '%';
    const hint = document.getElementById('sidHint');
    hint.textContent = parsed.year + ' 届  ·  专业 ' + parsed.major;
    hint.className   = 'sid-hint ok';
    drawPlant(sid, stage, health);
    const done = cis.includes(today);
    const btn  = document.getElementById('checkinBtn');
    btn.disabled    = done;
    btn.textContent = done ? '今日已打卡' : '今日打卡';
  } else {
    document.getElementById('stageName').textContent = '···';
    ['daysVal','ciVal','hlthVal'].forEach(id =>
      document.getElementById(id).textContent = '—');
    document.getElementById('checkinBtn').disabled    = true;
    document.getElementById('checkinBtn').textContent = '今日打卡';
    drawPlant(null, 0, 0);
  }

  buildCalendar();
}

function setSID() {
  const val = document.getElementById('sidInput').value.trim();
  if (/^\d{11}$/.test(val)) {
    localStorage.setItem(K.sid, val);
    if (!localStorage.getItem(K.fd)) localStorage.setItem(K.fd, getToday());
    refresh();
  } else {
    const inp = document.getElementById('sidInput');
    inp.classList.add('shake');
    setTimeout(() => inp.classList.remove('shake'), 300);
    const hint = document.getElementById('sidHint');
    hint.textContent = '请输入 11 位数字学号';
    hint.className   = 'sid-hint';
  }
}

let _rPhase = 0, _rTimer = null;
function handleReset() {
  const btn = document.getElementById('resetBtn');
  if (_rPhase === 0) {
    _rPhase = 1;
    btn.textContent = '确定?';
    btn.style.color = '#d07070';
    _rTimer = setTimeout(() => {
      _rPhase = 0; btn.textContent = '重置'; btn.style.color = '';
    }, 2500);
  } else {
    clearTimeout(_rTimer);
    _rPhase = 0; btn.textContent = '重置'; btn.style.color = '';
    Object.values(K).forEach(k => localStorage.removeItem(k));
    refresh();
  }
}

function nextDay() {
  localStorage.setItem(K.off, getOff() + 1);
  refresh();
}

function showNotif() {
  const n = document.getElementById('notif');
  n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 1500);
}

document.getElementById('sidInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') setSID();
});

refresh();
</script>
</body>
</html>
