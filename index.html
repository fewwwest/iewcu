<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>植物志</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f4f0eb;--panel:#faf8f5;--border:#d8cfc4;--text:#7a6e64;--light:#3a322c;
  --accent:#6a7a5a;--gold:#8a7040;--dim:#b0a89c;--btn:#ede8e2;--btn-h:#e0d8d0;
  --dot-off:#e0d8d0;--dot-on:#8a9a7a;--dot-now:#5a6a4a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Press Start 2P',monospace;font-size:8px;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 12px 48px;}
.wrap{width:100%;max-width:340px;display:flex;flex-direction:column;gap:12px;}
.hdr{display:flex;align-items:baseline;justify-content:space-between;padding-bottom:10px;border-bottom:2px solid var(--border);}
.title{color:var(--light);font-size:9px;letter-spacing:1px;}
.sub{color:var(--dim);font-size:5px;letter-spacing:2px;}
.sid-row{display:flex;gap:6px;}
#sidInput{flex:1;background:var(--panel);border:2px solid var(--border);color:var(--light);
  font-family:'Press Start 2P',monospace;font-size:7px;padding:7px 8px;outline:none;letter-spacing:2px;}
#sidInput:focus{border-color:var(--accent);}
#sidInput::placeholder{color:var(--dim);letter-spacing:0;}
#sidInput.shake{animation:shake .28s;}
@keyframes shake{0%,100%{transform:translateX(0)}30%{transform:translateX(-5px)}70%{transform:translateX(5px)}}
.sid-hint{font-size:5px;letter-spacing:1px;margin-top:5px;min-height:10px;color:var(--dim);}
.sid-hint.ok{color:var(--accent);}
.btn{background:var(--btn);border:2px solid var(--border);color:var(--text);
  font-family:'Press Start 2P',monospace;font-size:6px;padding:6px 10px;
  cursor:pointer;white-space:nowrap;transition:background .1s,color .1s;}
.btn:hover{background:var(--btn-h);color:var(--light);}
.btn:active{filter:brightness(.95);}
.btn.primary{flex:1;padding:10px;font-size:7px;background:var(--accent);border-color:var(--accent);color:#f0f4ec;}
.btn.primary:hover{background:#7a8a6a;}
.btn.primary:disabled{background:var(--btn);border-color:var(--border);color:var(--dim);cursor:default;}
.btn.export{background:var(--btn);border-color:var(--border);color:var(--dim);font-size:5px;padding:10px;}
.btn.export:hover{color:var(--light);}
.btn.test{background:var(--btn);border-color:var(--border);color:var(--dim);font-size:5px;padding:5px 8px;}
.btn.danger{background:var(--btn);border-color:#d0b0a0;color:#b08070;font-size:5px;padding:5px 8px;}
.btn.danger:hover{color:#906050;}
.garden{background:var(--panel);border:2px solid var(--border);
  display:flex;flex-direction:column;align-items:center;padding:16px 16px 10px;gap:8px;}
#plantCanvas{width:240px;height:240px;display:block;background:#f5f0e8;}
.stage-name{color:var(--gold);font-size:7px;letter-spacing:4px;}
.stats{display:flex;justify-content:space-around;padding:8px 0;
  border-top:2px solid var(--border);border-bottom:2px solid var(--border);}
.stat{text-align:center;}
.stat-v{color:var(--light);font-size:11px;display:block;margin-bottom:5px;}
.stat-l{color:var(--dim);font-size:5px;letter-spacing:1px;}
.cal-lbl{color:var(--dim);font-size:5px;letter-spacing:2px;margin-bottom:7px;}
#calGrid{display:grid;grid-template-rows:repeat(7,6px);grid-auto-flow:column;grid-auto-columns:6px;gap:2px;}
.cc{background:var(--dot-off);}
.cc.c{background:var(--dot-on);}
.cc.t{outline:1px solid var(--dot-now);outline-offset:1px;}
.cc.f{opacity:.3;}
.test-bar{display:flex;gap:6px;align-items:center;border-top:1px dashed var(--border);padding-top:10px;}
.test-lbl{color:var(--border);font-size:5px;margin-right:auto;}
#notif{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-48px);
  background:var(--accent);color:#f0f4ec;font-family:'Press Start 2P',monospace;font-size:7px;
  padding:8px 16px;border:2px solid #8aaa7a;z-index:100;pointer-events:none;
  transition:transform .2s cubic-bezier(.2,.9,.3,1);}
#notif.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="notif">打卡成功</div>
<div class="wrap">
  <div class="hdr"><span class="title">植物志</span><span class="sub">PLANT CODEX</span></div>
  <div>
    <div class="sid-row">
      <input id="sidInput" type="text" inputmode="numeric" maxlength="11" placeholder="11 位学号" autocomplete="off">
      <button class="btn" onclick="setSID()">确认</button>
    </div>
    <div id="sidHint" class="sid-hint">&nbsp;</div>
  </div>
  <div class="garden">
    <canvas id="plantCanvas" width="240" height="240"></canvas>
    <div class="stage-name" id="stageName">···</div>
  </div>
  <div style="display:flex;gap:8px;align-items:stretch;">
    <button class="btn primary" id="checkinBtn" onclick="checkin()" disabled>今日打卡</button>
    <button class="btn export" onclick="exportPNG()">导出</button>
  </div>
  <div class="stats">
    <div class="stat"><span class="stat-v" id="daysVal">—</span><span class="stat-l">陪伴天数</span></div>
    <div class="stat"><span class="stat-v" id="ciVal">—</span><span class="stat-l">打卡次数</span></div>
    <div class="stat"><span class="stat-v" id="hlthVal">—</span><span class="stat-l">活跃度</span></div>
  </div>
  <div><div class="cal-lbl">打卡记录</div><div id="calGrid"></div></div>
  <div class="test-bar">
    <span class="test-lbl">TEST</span>
    <button class="btn test" onclick="nextDay()">+1 天</button>
    <button class="btn danger" id="resetBtn" onclick="handleReset()">重置</button>
  </div>
</div>
<script>
/* ── PALETTES / RNG ── */
const STAGE_NAMES=['休眠','破土','嫩芽','初枝','繁茂','葱茏','参天','古木','永恒'];
const STAGE_THRESH=[0,1,3,6,9,13,17,21,25];

function hash32(s){let h=0x811c9dc5>>>0;for(const c of String(s)){h^=c.charCodeAt(0);h=Math.imul(h,0x01000193)>>>0;}return h;}
function seededRng(seed){let s=seed>>>0;return()=>{s=((s+0x6D2B79F5)|0)>>>0;let t=Math.imul(s^(s>>>15),1|s);t=t+Math.imul(t^(t>>>7),61|t)^t;return((t^(t>>>14))>>>0)/4294967296;};}

const PALETTES=[
  {a:'#7060a8',b:'#a890d0',c:'#c8b0e8'},{a:'#306878',b:'#50a0b8',c:'#80c8d8'},
  {a:'#806020',b:'#b09040',c:'#d0b860'},{a:'#883050',b:'#c06080',c:'#d898a8'},
  {a:'#304880',b:'#5080c0',c:'#80a8e0'},{a:'#285840',b:'#489868',c:'#78c898'},
  {a:'#486018',b:'#789030',c:'#a8c060'},{a:'#704020',b:'#a06838',c:'#c89060'},
];
const MAJOR_COLS=['#8a6a4a','#4a6a8a','#6a8a4a','#8a4a6a','#4a8a6a','#6a4a8a','#8a8a4a','#4a4a8a'];
const ACCENT_COLS=['#e05050','#e0a030','#50a0e0','#a050e0','#50e0a0','#e050a0','#ffffff','#c0c0c0'];

function parseID(sid){if(!/^\d{11}$/.test(sid))return null;const year=parseInt(sid.slice(0,4));
  return{year,major:sid.slice(4,8),num:sid.slice(8,11),
    palIdx:((year-2018)%8+8)%8,majIdx:hash32(sid.slice(4,8))%MAJOR_COLS.length,accIdx:hash32(sid.slice(8,11))%ACCENT_COLS.length};}

function getGenome(sid){const p=parseID(sid);if(!p)return null;
  const rng=seededRng(hash32(sid));const pal=PALETTES[p.palIdx];
  return{col1:pal.a,col2:pal.b,col3:pal.c,stem:MAJOR_COLS[p.majIdx],acc:ACCENT_COLS[p.accIdx],
    foliageShape:Math.floor(rng()*3),stemShape:Math.floor(rng()*3),
    spread:0.35+rng()*0.45,lean:(rng()-0.5)*0.25,lineWeight:0.7+rng()*1.1};}

/* ── STORAGE / GROWTH ── */
const K={sid:'pp_sid',ci:'pp_ci',off:'pp_off',fd:'pp_fd',fallen:'pp_fallen'};
function getOff(){return parseInt(localStorage.getItem(K.off)||'0');}
function getToday(){const d=new Date();d.setDate(d.getDate()+getOff());return d.toISOString().slice(0,10);}
function getCIs(){try{return JSON.parse(localStorage.getItem(K.ci)||'[]');}catch{return[];}}
function getFallen(){return parseInt(localStorage.getItem(K.fallen)||'0');}
function setFallen(n){localStorage.setItem(K.fallen,Math.max(0,Math.min(10,Math.round(n))));}

function calcGrowth(cis){
  const today=getToday();
  let fd=localStorage.getItem(K.fd);if(!fd){fd=today;localStorage.setItem(K.fd,fd);}
  const days=Math.max(0,Math.round((new Date(today)-new Date(fd))/86400000));
  const total=cis.length;
  const score=days*0.6+total*1.2;
  let scoredStage=0;
  for(let i=STAGE_THRESH.length-1;i>=0;i--)if(score>=STAGE_THRESH[i]){scoredStage=i;break;}
  const cutoff=new Date(today);cutoff.setDate(cutoff.getDate()-21);
  const cutStr=cutoff.toISOString().slice(0,10);
  const recent=cis.filter(d=>d>=cutStr).length;
  const windowDays=Math.min(days,21);
  const health=windowDays===0?1.0:Math.min(1,recent/Math.max(1,windowDays*0.65));
  const maxStage=parseInt(localStorage.getItem('pp_maxstage')||'0');
  const stage=Math.min(scoredStage,maxStage);
  return{days,total,score,stage,health,scoredStage};
}

/* ── CANVAS ── */
const CV=document.getElementById('plantCanvas');
const CX=CV.getContext('2d');

const TRUNK_HEIGHTS=[0,20,38,56,74,90,106,124,140];
const BRANCH_FRACS=[[],[],[0.55],[0.42,0.75],[0.32,0.56,0.78],[0.25,0.44,0.62,0.80],
  [0.20,0.38,0.54,0.68,0.82],[0.16,0.30,0.44,0.57,0.69,0.81],
  [0.13,0.25,0.37,0.49,0.60,0.70,0.80,0.90]];
const PAD=12;

function withClip(fn){CX.save();CX.beginPath();CX.rect(PAD,PAD,240-PAD*2,240-PAD*2);CX.clip();fn();CX.restore();}
function stk(col,w,fn){CX.save();CX.strokeStyle=col;CX.lineWidth=w;CX.lineCap='round';CX.lineJoin='round';fn();CX.restore();}

// bezier curve — curve=1 full arc, curve=0 straight line
function branchCurve(x0,y0,x1,y1,curvature,rng,curve=1){
  const mx=(x0+x1)/2,my=(y0+y1)/2;
  const len=Math.sqrt((x1-x0)**2+(y1-y0)**2)||1;
  const px=(-(y1-y0)/len*curvature+(rng()-0.5)*4)*curve;
  const py=( (x1-x0)/len*curvature+(rng()-0.5)*4)*curve;
  CX.beginPath();CX.moveTo(x0,y0);
  CX.bezierCurveTo(x0+(mx-x0)*0.5+px,y0+(my-y0)*0.5+py,x1-(x1-mx)*0.5+px,y1-(y1-my)*0.5+py,x1,y1);
  CX.stroke();
}

function witherCol(hex,health){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const t=Math.pow(Math.max(0,1-health)*1.1,1.5);
  const wr=health<0.2?100:155,wg=health<0.2?90:118,wb=health<0.2?78:62;
  return `rgb(${Math.round(r+(wr-r)*t)},${Math.round(g+(wg-g)*t)},${Math.round(b+(wb-b)*t)})`;
}
function dryCol(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r*0.2+148*0.8)},${Math.round(g*0.2+112*0.8)},${Math.round(b*0.2+60*0.8)})`;
}

// v2 foliage — unchanged
function drawFoliage(cx,cy,size,g,health,rng){
  const n=1+(rng()>0.6?1:0);
  const cols=[g.col1,g.col2,g.col3];
  for(let i=0;i<n;i++){
    const col=cols[i%cols.length],w=g.lineWeight*(0.7+i*0.1);
    const ox=(rng()-0.5)*size*0.5,oy=(rng()-0.5)*size*0.4,s=g.foliageShape;
    if(s===0){
      const rx=size*(0.25+rng()*0.30),ry=size*(0.18+rng()*0.22);
      stk(col,w,()=>{CX.beginPath();CX.ellipse(cx+ox,cy+oy,rx,ry,(rng()-0.5)*1.0,0,Math.PI*2);CX.stroke();});
    }else if(s===1){
      const rw=size*(0.30+rng()*0.32),rh=size*(0.20+rng()*0.24),rot=(rng()-0.5)*1.1;
      stk(col,w,()=>{CX.save();CX.translate(cx+ox,cy+oy);CX.rotate(rot);CX.strokeRect(-rw/2,-rh/2,rw,rh);CX.restore();});
    }else{
      const nL=3+Math.floor(rng()*3),bA=-Math.PI/2+(rng()-0.5)*0.6,fW=0.5+rng()*0.7;
      stk(col,w,()=>{for(let j=0;j<nL;j++){const a=bA-fW/2+(j/Math.max(nL-1,1))*fW,len=size*(0.35+rng()*0.40);CX.beginPath();CX.moveTo(cx+ox,cy+oy);CX.lineTo(cx+ox+Math.cos(a)*len,cy+oy+Math.sin(a)*len);CX.stroke();}});
    }
  }
  if(health>=0.72&&rng()>0.55){stk(g.acc,g.lineWeight*0.7,()=>{CX.beginPath();CX.arc(cx+(rng()-0.5)*size*0.3,cy-size*0.22,size*0.10+1.5,0,Math.PI*2);CX.stroke();});}
}

function drawPlant(sid,stage,health,fallenCount=0){
  CX.clearRect(0,0,240,240);
  CX.fillStyle='#f5f0e8';CX.fillRect(0,0,240,240);
  CX.strokeStyle='rgba(180,165,145,0.08)';
  for(let y=0;y<240;y+=6){CX.beginPath();CX.moveTo(0,y);CX.lineTo(240,y);CX.stroke();}

  const g=getGenome(sid);if(!g)return;
  const wither=Math.max(0,1-health);
  const gw={...g,
    col1:witherCol(g.col1,health),col2:witherCol(g.col2,health),
    col3:witherCol(g.col3,health),stem:witherCol(g.stem,health)};
  const rng=seededRng(hash32(sid)^0x9e3779b9);
  const GX=116+(rng()-0.5)*10,GY=220;

  // ── fallen leaves ──
  if(fallenCount>0){
    const dryPal=[g.col1,g.col2,g.col3].map(dryCol);
    const lr=seededRng(hash32(sid)^0xdeadcafe);
    const s=g.foliageShape;
    for(let i=0;i<fallenCount;i++){
      const lx=16+lr()*208,ly=Math.min(GY+3+lr()*14,234),col=dryPal[i%dryPal.length];
      stk(col,gw.lineWeight*0.6,()=>{
        if(s===0){CX.beginPath();CX.ellipse(lx,ly,4+lr()*3,2+lr()*2,lr()*Math.PI,0,Math.PI*2);CX.stroke();}
        else if(s===1){const rw=5+lr()*4,rh=2.5+lr()*2;CX.save();CX.translate(lx,ly);CX.rotate((lr()-0.5)*0.9);CX.strokeRect(-rw/2,-rh/2,rw,rh);CX.restore();}
        else{const a=(lr()-0.5)*Math.PI*0.5,len=4+lr()*4;CX.beginPath();CX.moveTo(lx,ly);CX.lineTo(lx+Math.cos(a)*len,ly+Math.sin(a)*len*0.35);CX.stroke();}
      });
    }
  }

  if(stage===0){
    stk(gw.stem,gw.lineWeight*0.9,()=>{CX.beginPath();CX.moveTo(GX,GY-12);CX.lineTo(GX+8,GY-4);CX.lineTo(GX,GY+2);CX.lineTo(GX-8,GY-4);CX.closePath();CX.stroke();});
    return;
  }

  const tH=TRUNK_HEIGHTS[stage],fracs=BRANCH_FRACS[stage];
  const leanX=gw.lean*tH*0.55,nodeR=13+stage*3.2;

  // bezier curve amount: 1 at full health, fades to 0 at health=0.5
  const curve=Math.min(1,Math.max(0,(health-0.5)*2));

  // trunk fold: "1" → "7"
  // at low health, trunk snaps at breakFrac height, top hangs down diagonally
  // breakFrac: 1.0 at full health (no break), drops as wither increases
  const breakFrac=health>0.5?1.0:Math.max(0.25,health*2);
  const brkY=GY-tH*breakFrac;
  const brkX=GX+leanX*breakFrac;

  withClip(()=>{
    // base shape — unchanged from v2
    const bsz=7+stage*1.6;
    stk(gw.stem,gw.lineWeight,()=>{
      if(gw.stemShape===0){CX.beginPath();CX.moveTo(GX-bsz,GY);CX.lineTo(GX+bsz,GY);CX.lineTo(GX+leanX*0.2,GY-bsz*1.4);CX.closePath();CX.stroke();}
      else if(gw.stemShape===1){CX.strokeRect(GX-bsz*0.65,GY-bsz*0.6,bsz*1.3,bsz*0.6);}
      else{CX.beginPath();CX.moveTo(GX-bsz,GY);CX.lineTo(GX+bsz,GY-bsz*0.7);CX.stroke();CX.beginPath();CX.moveTo(GX+bsz,GY);CX.lineTo(GX-bsz,GY-bsz*0.7);CX.stroke();}
    });

    // trunk: draw to break point (healthy → full height; sick → partial)
    stk(gw.stem,gw.lineWeight*1.4,()=>{branchCurve(GX,GY,brkX,brkY,leanX*0.3*breakFrac,rng,curve);});
    if(stage>=5)stk(gw.col1,gw.lineWeight*0.5,()=>{branchCurve(GX+2.5,GY,brkX+2.5,brkY,leanX*0.2*breakFrac+3,rng,curve);});

    // if trunk is broken: draw the hanging portion from break point
    if(breakFrac<1.0){
      const hangLen=tH*(1-breakFrac)*0.7;
      const hangAng=Math.PI/2+(gw.lean>=0?0.4:-0.4); // leans toward genome lean side
      const hangX=brkX+Math.cos(hangAng)*hangLen;
      const hangY=brkY+Math.sin(hangAng)*hangLen;
      stk(gw.stem,gw.lineWeight*0.85,()=>{CX.beginPath();CX.moveTo(brkX,brkY);CX.lineTo(hangX,hangY);CX.stroke();});
      if(stage>=5)stk(gw.col1,gw.lineWeight*0.4,()=>{CX.beginPath();CX.moveTo(brkX+2,brkY);CX.lineTo(hangX+2,hangY);CX.stroke();});
    }

    // branches — only those below break point survive; outer ones snap first
    const tipY=GY-tH; // original tip (for foliage positioning on healthy tree)
    const showFoliage=health>0.5;
    const nB=fracs.length;
    const branchSurvive=health<0.5?health*2:1.0;

    fracs.forEach((frac,bi)=>{
      // only draw branches that are below the trunk break point
      if(frac>breakFrac+0.05)return;

      const by=GY-tH*frac,bx=GX+leanX*frac;
      const baseAng=gw.spread*0.5;
      const angAtFrac=baseAng+frac*(0.55-baseAng);
      const ang=angAtFrac*Math.PI;
      const bLen=(22+nodeR*0.85)*(0.65+(1-frac)*0.5);
      const asymL=1+(rng()-0.5)*0.22,asymR=1+(rng()-0.5)*0.22;

      // outer (high rank) branches snap first — only when withering
      const rankFromTop=(nB-1-bi)/Math.max(nB-1,1);
      let snapped=false;
      if(health<0.5){
        const alive=rankFromTop<branchSurvive-0.15;
        snapped=!alive&&rankFromTop<branchSurvive+0.12;
        if(!alive&&!snapped)return;
      }

      [[-1,asymL],[1,asymR]].forEach(([side,asym])=>{
        const bLenS=bLen*asym;
        const tx=bx+side*Math.cos(ang)*bLenS;
        const ty=by-Math.sin(ang)*bLenS;
        const col=bi%2===0?gw.col1:gw.col2;
        const droop=(1-frac)*6*side;

        if(snapped){
          const br=seededRng(hash32(sid+bi*31+side*7));
          const breakT=0.45+br()*0.25;
          const bkX=bx+(tx-bx)*breakT,bkY=by+(ty-by)*breakT;
          stk(col,gw.lineWeight,()=>{CX.beginPath();CX.moveTo(bx,by);CX.lineTo(bkX,bkY);CX.stroke();});
          const remLen=Math.sqrt((tx-bkX)**2+(ty-bkY)**2)*0.55;
          const hAng=Math.PI/2+(br()-0.4)*0.7;
          stk(col,gw.lineWeight*0.75,()=>{CX.beginPath();CX.moveTo(bkX,bkY);CX.lineTo(bkX+Math.cos(hAng)*remLen,bkY+Math.sin(hAng)*remLen);CX.stroke();});
        }else{
          // use shared rng — same as v2, keeps foliage shapes identical
          stk(col,gw.lineWeight*0.95,()=>{branchCurve(bx,by,tx,ty,droop,rng,curve);});
          if(showFoliage){
            drawFoliage(tx,ty,nodeR,gw,health,rng);
            if(stage>=4&&rng()>0.55){
              const mt=0.45+rng()*0.15;
              drawFoliage(bx+side*Math.cos(ang)*bLenS*mt,by-Math.sin(ang)*bLenS*mt,nodeR*0.52,gw,health*0.7,rng);
            }
          }
        }
      });
    });

    // crown — only if trunk reaches near full height
    if(showFoliage&&breakFrac>0.85)drawFoliage(GX+leanX,tipY,nodeR*1.25,gw,health,rng);
  });
}

/* ── EXPORT ── */
function exportPNG(){
  const oc=document.createElement('canvas');oc.width=480;oc.height=480;
  const ox=oc.getContext('2d');ox.imageSmoothingEnabled=true;ox.drawImage(CV,0,0,480,480);
  const sid=localStorage.getItem(K.sid)||'plant';
  const{stage}=calcGrowth(getCIs());
  const name=`植物志_${sid}_${STAGE_NAMES[stage]}.png`;
  const a=document.createElement('a');a.download=name;a.href=oc.toDataURL('image/png');a.click();
}

/* ── CALENDAR ── */
function buildCalendar(){
  const grid=document.getElementById('calGrid');grid.innerHTML='';
  const today=getToday(),checked=new Set(getCIs());
  const start=new Date(today);start.setDate(start.getDate()-start.getDay()-15*7);
  for(let w=0;w<16;w++)for(let d=0;d<7;d++){
    const cur=new Date(start);cur.setDate(cur.getDate()+w*7+d);
    const ds=cur.toISOString().slice(0,10);
    const cell=document.createElement('div');cell.className='cc';
    if(checked.has(ds))cell.classList.add('c');
    if(ds===today)cell.classList.add('t');
    if(ds>today)cell.classList.add('f');
    grid.appendChild(cell);
  }
}

/* ── CHECKIN / REFRESH ── */
function checkin(){
  const today=getToday(),arr=getCIs();
  if(arr.includes(today))return;
  if(!localStorage.getItem(K.fd))localStorage.setItem(K.fd,today);
  arr.push(today);localStorage.setItem(K.ci,JSON.stringify(arr));
  const{health,scoredStage}=calcGrowth(arr);
  if(health>=0.5){
    const cur=parseInt(localStorage.getItem('pp_maxstage')||'0');
    if(scoredStage>cur)localStorage.setItem('pp_maxstage',cur+1);
  }
  if(health>0.35)setFallen(getFallen()-1);
  showNotif();refresh();
}

function refresh(){
  const sid=localStorage.getItem(K.sid)||'';
  const valid=/^\d{11}$/.test(sid);
  document.getElementById('sidInput').value=sid;
  const cis=getCIs(),today=getToday();
  if(valid){
    const parsed=parseID(sid);
    const{days,total,stage,health}=calcGrowth(cis);
    const lastDate=localStorage.getItem('pp_fallen_date')||'';
    if(health<0.45&&lastDate!==today){
      setFallen(getFallen()+(health<0.15?2:1));
      localStorage.setItem('pp_fallen_date',today);
    }
    document.getElementById('stageName').textContent=STAGE_NAMES[stage];
    document.getElementById('daysVal').textContent=days;
    document.getElementById('ciVal').textContent=total;
    document.getElementById('hlthVal').textContent=Math.round(health*100)+'%';
    const hint=document.getElementById('sidHint');
    hint.textContent=parsed.year+' 届  ·  专业 '+parsed.major;
    hint.className='sid-hint ok';
    drawPlant(sid,stage,health,getFallen());
    const done=cis.includes(today);
    const btn=document.getElementById('checkinBtn');
    btn.disabled=done;btn.textContent=done?'今日已打卡':'今日打卡';
  }else{
    document.getElementById('stageName').textContent='···';
    ['daysVal','ciVal','hlthVal'].forEach(id=>document.getElementById(id).textContent='—');
    document.getElementById('checkinBtn').disabled=true;
    document.getElementById('checkinBtn').textContent='今日打卡';
    CX.clearRect(0,0,240,240);CX.fillStyle='#f5f0e8';CX.fillRect(0,0,240,240);
  }
  buildCalendar();
}

function setSID(){
  const val=document.getElementById('sidInput').value.trim();
  if(/^\d{11}$/.test(val)){
    localStorage.setItem(K.sid,val);
    if(!localStorage.getItem(K.fd))localStorage.setItem(K.fd,getToday());
    // initialise maxStage to 0 on new SID
    if(!localStorage.getItem('pp_maxstage'))localStorage.setItem('pp_maxstage','0');
    refresh();
  }else{
    const inp=document.getElementById('sidInput');
    inp.classList.add('shake');setTimeout(()=>inp.classList.remove('shake'),300);
    document.getElementById('sidHint').textContent='请输入 11 位数字学号';
    document.getElementById('sidHint').className='sid-hint';
  }
}

let _rPhase=0,_rTimer=null;
function handleReset(){
  const btn=document.getElementById('resetBtn');
  if(_rPhase===0){_rPhase=1;btn.textContent='确定?';btn.style.color='#906050';
    _rTimer=setTimeout(()=>{_rPhase=0;btn.textContent='重置';btn.style.color='';},2500);
  }else{
    clearTimeout(_rTimer);_rPhase=0;btn.textContent='重置';btn.style.color='';
    Object.values(K).forEach(k=>localStorage.removeItem(k));
    ['pp_fallen_date','pp_maxstage'].forEach(k=>localStorage.removeItem(k));
    refresh();
  }
}

function nextDay(){localStorage.setItem(K.off,getOff()+1);refresh();}
function showNotif(){const n=document.getElementById('notif');n.classList.add('show');setTimeout(()=>n.classList.remove('show'),1500);}

document.getElementById('sidInput').addEventListener('keydown',e=>{if(e.key==='Enter')setSID();});
refresh();
</script>
