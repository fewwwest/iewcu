<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siren Topographies — Composite Score</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif&family=JetBrains+Mono:wght@300;400&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F4F0E8; color: #1C1812; font-family: 'Baskerville','Georgia',serif; display: flex; flex-direction: column; min-height: 100vh; }

  header { padding: 32px 36px 20px; border-bottom: 1px solid #B8AE9C; }
  .tag { font-family: 'JetBrains Mono',monospace; font-size: 8px; letter-spacing: 5px; color: #7A6E5E; font-weight: 300; margin-bottom: 6px; }
  h1 { font-family: 'Instrument Serif','Baskerville',serif; font-size: 28px; font-weight: 400; line-height: 1.15; }
  .subtitle { font-family: 'JetBrains Mono',monospace; font-size: 11px; color: #7A6E5E; margin-top: 6px; line-height: 1.6; }

  .toolbar { padding: 14px 36px; border-bottom: 1px solid #B8AE9C; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .btn { border: none; font-family: 'JetBrains Mono',monospace; font-size: 10px; letter-spacing: 2px; padding: 10px 20px; cursor: pointer; }
  .btn-primary { background: #1C1812; color: #F4F0E8; }
  .btn-primary.playing { background: #8C2E2E; }
  .btn-small { background: transparent; border: 1px solid #7A6E5E; color: #7A6E5E; font-family: 'JetBrains Mono',monospace; font-size: 9px; padding: 6px 12px; cursor: pointer; letter-spacing: 1px; }
  .tempo-control { display: flex; align-items: center; gap: 8px; font-family: 'JetBrains Mono',monospace; font-size: 10px; color: #7A6E5E; }
  .tempo-control input { width: 56px; background: transparent; border: 1px solid #7A6E5E; color: #1C1812; padding: 6px 8px; font-family: 'JetBrains Mono',monospace; font-size: 10px; text-align: center; }
  .wave-select { font-family: 'JetBrains Mono',monospace; font-size: 10px; background: transparent; border: 1px solid #7A6E5E; color: #1C1812; padding: 7px 10px; cursor: pointer; }

  .main-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 32px 36px; }

  .composite-wrap { position: relative; }
  .composite-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(4, 1fr);
    border: 1.5px solid #1C1812;
  }
  .cell {
    position: relative;
    overflow: hidden;
    cursor: pointer;
    border: 0.5px solid rgba(28,24,18,0.12);
    transition: all 0.15s;
  }
  .cell canvas { display: block; width: 100%; height: 100%; }
  .cell.active { box-shadow: inset 0 0 0 2px #8C2E2E; z-index: 2; }
  .cell.rest { background: #F4F0E8; }
  .cell .cell-label {
    position: absolute; bottom: 2px; left: 3px;
    font-family: 'JetBrains Mono',monospace; font-size: 7px; color: rgba(122,110,94,0);
    transition: color 0.15s; pointer-events: none; line-height: 1;
  }
  .cell:hover .cell-label { color: rgba(122,110,94,0.7); }
  .cell.active .cell-label { color: #8C2E2E; }
  .cell .cell-lyric {
    position: absolute; top: 2px; right: 3px;
    font-family: 'Instrument Serif',serif; font-size: 9px; color: rgba(122,110,94,0);
    transition: color 0.15s; pointer-events: none;
  }
  .cell:hover .cell-lyric { color: rgba(122,110,94,0.6); }
  .cell.active .cell-lyric { color: #8C2E2E; }

  .row-labels { position: absolute; left: -20px; top: 0; bottom: 0; display: flex; flex-direction: column; justify-content: space-around; }
  .row-labels span { font-family: 'JetBrains Mono',monospace; font-size: 7px; color: #B8AE9C; }
  .col-labels { position: absolute; top: -14px; left: 0; right: 0; display: flex; justify-content: space-around; }
  .col-labels span { font-family: 'JetBrains Mono',monospace; font-size: 7px; color: #B8AE9C; }

  .caption { font-family: 'JetBrains Mono',monospace; font-size: 8px; color: #7A6E5E; letter-spacing: 2px; text-align: center; margin-top: 16px; }

  footer { padding: 16px 36px; border-top: 1px solid #B8AE9C; display: flex; justify-content: space-between; font-family: 'JetBrains Mono',monospace; font-size: 9px; color: #B8AE9C; }
</style>
</head>
<body>

<header>
  <div class="tag">TOPOLOGY OF SIRENS</div>
  <h1>Mary Had a Little Lamb</h1>
  <div class="subtitle">4 × 8 composite — each cell is a fragment of that note's Chladni contour field at its grid position</div>
</header>

<div class="toolbar" id="toolbar"></div>
<div class="main-area"><div class="composite-wrap" id="composite-wrap"></div></div>
<footer>
  <span>Read left → right, top → bottom</span>
  <span>C4 · D4 · E4 · G4</span>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
// ── Config ──
const COLS = 8, ROWS = 4;
const FIELD_GRID = 200;
const LEVELS = 32;
const PAPER = "#F4F0E8", INK = "#1C1812";
const LINE_DARK = "#3A3228", LINE_MID = "#7A6E5E", LINE_LIGHT = "#B8AE9C";

const NOTES = {
  'C4': { freq: 261.63, name: 'C4' },
  'D4': { freq: 293.66, name: 'D4' },
  'E4': { freq: 329.63, name: 'E4' },
  'G4': { freq: 392.00, name: 'G4' },
  'REST': { freq: 0, name: '—' },
};

// 32 notes (4 rows × 8 cols) including rests
const SEQUENCE = [
  // row 1: bars 1-2
  { note:'E4', lyric:'Ma' },  { note:'D4', lyric:'ry' },
  { note:'C4', lyric:'had' }, { note:'D4', lyric:'a' },
  { note:'E4', lyric:'lit' },{ note:'E4', lyric:'tle' },
  { note:'E4', lyric:'lamb,' },{ note:'REST', lyric:'' },
  // row 2: bars 3-4
  { note:'D4', lyric:'lit' },{ note:'D4', lyric:'tle' },
  { note:'D4', lyric:'lamb,' },{ note:'REST', lyric:'' },
  { note:'E4', lyric:'lit' },{ note:'G4', lyric:'tle' },
  { note:'G4', lyric:'lamb.' },{ note:'REST', lyric:'' },
  // row 3: bars 5-6
  { note:'E4', lyric:'Ma' },{ note:'D4', lyric:'ry' },
  { note:'C4', lyric:'had' },{ note:'D4', lyric:'a' },
  { note:'E4', lyric:'lit' },{ note:'E4', lyric:'tle' },
  { note:'E4', lyric:'lamb,' },{ note:'E4', lyric:'its' },
  // row 4: bars 7-8
  { note:'D4', lyric:'fleece' },{ note:'D4', lyric:'was' },
  { note:'E4', lyric:'white' },{ note:'D4', lyric:'as' },
  { note:'C4', lyric:'snow.' },{ note:'REST', lyric:'' },
  { note:'REST', lyric:'' },{ note:'REST', lyric:'' },
];

let state = { bpm: 120, waveform: 'sine', currentIdx: -1, isPlaying: false };
let audioCtx = null, oscNode = null, gainNode = null, playTimeout = null;

// ── Chladni Field ──
function chladni(x, y, n, m, s) {
  return Math.cos(n*Math.PI*x)*Math.cos(m*Math.PI*y) + s*Math.cos(m*Math.PI*x)*Math.cos(n*Math.PI*y);
}
function freqToModes(freq) {
  const b = freq / 50;
  const n1 = Math.max(1, Math.round(b % 12)), m1 = Math.max(1, Math.round((b*0.618) % 10));
  const modes = [{ n:n1, m:m1, w:1, s:1 }];
  const h2 = freq*2, n2 = Math.max(1, Math.round((h2/50)%12)), m2 = Math.max(1, Math.round((h2/50*0.618)%10));
  if (n2!==n1 || m2!==m1) modes.push({ n:n2, m:m2, w:0.5, s:-1 });
  const h3 = freq*3, n3 = Math.max(1, Math.round((h3/50)%12)), m3 = Math.max(1, Math.round((h3/50*0.618)%10));
  modes.push({ n:n3, m:m3, w:0.25, s:1 });
  return modes;
}
function generateField(modes) {
  const v = new Float64Array(FIELD_GRID * FIELD_GRID);
  for (let j = 0; j < FIELD_GRID; j++) for (let i = 0; i < FIELD_GRID; i++) {
    const x = i/(FIELD_GRID-1), y = j/(FIELD_GRID-1);
    let sum = 0;
    for (const md of modes) sum += md.w * chladni(x, y, md.n, md.m, md.s);
    v[j * FIELD_GRID + i] = sum;
  }
  return v;
}

// ── Render a single cell's fragment ──
// For cell at position idx (0..31), render the corresponding slice of that note's full contour field
function renderCellCanvas(idx, cellW, cellH) {
  const item = SEQUENCE[idx];
  if (item.note === 'REST') return null;

  const info = NOTES[item.note];
  const modes = freqToModes(info.freq);
  const values = generateField(modes);

  let min = Infinity, max = -Infinity;
  for (let i = 0; i < values.length; i++) { if (values[i]<min) min=values[i]; if (values[i]>max) max=values[i]; }

  // Which portion of the full field does this cell correspond to?
  const col = idx % COLS, row = Math.floor(idx / COLS);
  const cellFieldW = FIELD_GRID / COLS;
  const cellFieldH = FIELD_GRID / ROWS;
  const fieldX0 = col * cellFieldW;
  const fieldY0 = row * cellFieldH;
  const fieldX1 = fieldX0 + cellFieldW;
  const fieldY1 = fieldY0 + cellFieldH;

  const canvas = document.createElement('canvas');
  const dpr = 2;
  canvas.width = cellW * dpr;
  canvas.height = cellH * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.fillStyle = PAPER;
  ctx.fillRect(0, 0, cellW, cellH);

  // Generate contours for the full field, then clip-render only our cell's region
  const thresholds = d3.range(LEVELS).map(i => min + (i+1)*(max-min)/(LEVELS+1));
  const contourGen = d3.contours().size([FIELD_GRID, FIELD_GRID]).thresholds(thresholds);
  const contours = contourGen(values);

  // Map from field coordinates to canvas: field [fieldX0..fieldX1] → canvas [0..cellW]
  const sx = cellW / cellFieldW;
  const sy = cellH / cellFieldH;

  ctx.save();
  ctx.rect(0, 0, cellW, cellH);
  ctx.clip();

  const projection = d3.geoTransform({
    point: function(x, y) {
      this.stream.point((x - fieldX0) * sx, (y - fieldY0) * sy);
    }
  });
  const path = d3.geoPath(projection, ctx);

  contours.forEach((c, i) => {
    ctx.beginPath();
    path(c);
    const isIdx = i % 5 === 0;
    ctx.strokeStyle = isIdx ? LINE_DARK : (i%5===2 ? LINE_MID : LINE_LIGHT);
    ctx.lineWidth = isIdx ? 0.8 : 0.3;
    ctx.stroke();
  });

  ctx.restore();
  return canvas;
}

// ── Audio ──
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function stopOsc() {
  if (oscNode) { try{oscNode.stop();}catch(e){} oscNode.disconnect(); oscNode=null; }
  if (gainNode) { gainNode.disconnect(); gainNode=null; }
}
function playNote(freq, duration) {
  stopOsc();
  if (freq === 0) return;
  ensureAudio();
  const now = audioCtx.currentTime;
  oscNode = audioCtx.createOscillator();
  gainNode = audioCtx.createGain();
  oscNode.type = state.waveform;
  oscNode.frequency.setValueAtTime(freq, now);
  gainNode.gain.setValueAtTime(0, now);
  gainNode.gain.linearRampToValueAtTime(0.2, now+0.015);
  gainNode.gain.setValueAtTime(0.2, now+duration*0.7);
  gainNode.gain.linearRampToValueAtTime(0, now+duration);
  oscNode.connect(gainNode); gainNode.connect(audioCtx.destination);
  oscNode.start(now); oscNode.stop(now+duration);
}

function stopPlayback() {
  state.isPlaying = false; state.currentIdx = -1;
  if (playTimeout) { clearTimeout(playTimeout); playTimeout = null; }
  stopOsc(); renderToolbar(); highlightCurrent();
}
function startPlayback() {
  ensureAudio();
  state.isPlaying = true; state.currentIdx = 0;
  renderToolbar(); sequenceStep();
}
function sequenceStep() {
  if (state.currentIdx >= SEQUENCE.length) { stopPlayback(); return; }
  const item = SEQUENCE[state.currentIdx];
  const beatDur = 60 / state.bpm;
  const info = NOTES[item.note];
  playNote(info.freq, beatDur * 0.9);
  highlightCurrent();
  playTimeout = setTimeout(() => { state.currentIdx++; sequenceStep(); }, beatDur * 1000);
}
function playSingle(idx) {
  ensureAudio();
  const item = SEQUENCE[idx];
  if (item.note === 'REST') return;
  playNote(NOTES[item.note].freq, 0.4);
  state.currentIdx = idx; highlightCurrent();
  setTimeout(() => { if (state.currentIdx===idx && !state.isPlaying) { state.currentIdx=-1; highlightCurrent(); } }, 500);
}

function highlightCurrent() {
  document.querySelectorAll('.cell').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.idx) === state.currentIdx);
  });
}

// ── Render Toolbar ──
function renderToolbar() {
  const el = document.getElementById('toolbar');
  el.innerHTML = '';
  const playBtn = document.createElement('button');
  playBtn.className = 'btn btn-primary' + (state.isPlaying ? ' playing' : '');
  playBtn.textContent = state.isPlaying ? '■  STOP' : '▶  PLAY';
  playBtn.onclick = () => { state.isPlaying ? stopPlayback() : startPlayback(); };
  el.appendChild(playBtn);

  const tempo = document.createElement('div'); tempo.className = 'tempo-control';
  tempo.innerHTML = '<span>BPM</span>';
  const ti = document.createElement('input'); ti.type='number'; ti.value=state.bpm; ti.min=40; ti.max=300;
  ti.onchange = (e) => { state.bpm = Math.max(40, Math.min(300, parseInt(e.target.value)||120)); };
  tempo.appendChild(ti); el.appendChild(tempo);

  const ws = document.createElement('select'); ws.className = 'wave-select';
  [{v:'sine',t:'Sine'},{v:'square',t:'Square'},{v:'triangle',t:'Triangle'},{v:'sawtooth',t:'Sawtooth'}].forEach(o => {
    const opt = document.createElement('option'); opt.value=o.v; opt.textContent=o.t;
    if (state.waveform===o.v) opt.selected=true; ws.appendChild(opt);
  });
  ws.onchange = (e) => { state.waveform = e.target.value; };
  el.appendChild(ws);

  const spacer = document.createElement('div'); spacer.style.flex='1'; el.appendChild(spacer);

  const expBtn = document.createElement('button'); expBtn.className='btn-small'; expBtn.textContent='EXPORT PNG';
  expBtn.onclick = exportComposite;
  el.appendChild(expBtn);
}

// ── Export composite as single PNG ──
function exportComposite() {
  const grid = document.querySelector('.composite-grid');
  const rect = grid.getBoundingClientRect();
  const dpr = 2;
  const cW = Math.round(rect.width), cH = Math.round(rect.height);

  const canvas = document.createElement('canvas');
  canvas.width = cW * dpr; canvas.height = cH * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.fillStyle = PAPER;
  ctx.fillRect(0, 0, cW, cH);

  const cells = document.querySelectorAll('.cell');
  const cellW = cW / COLS, cellH = cH / ROWS;

  cells.forEach((cell, idx) => {
    const col = idx % COLS, row = Math.floor(idx / COLS);
    const x = col * cellW, y = row * cellH;
    const cvs = cell.querySelector('canvas');
    if (cvs) {
      ctx.drawImage(cvs, x, y, cellW, cellH);
    }
    // grid lines
    ctx.strokeStyle = 'rgba(28,24,18,0.12)';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(x, y, cellW, cellH);
  });

  // outer border
  ctx.strokeStyle = INK; ctx.lineWidth = 1.5;
  ctx.strokeRect(0, 0, cW, cH);

  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = 'mary-lamb-composite.png';
  a.click();
}

// ── Build Composite Grid ──
function buildGrid() {
  const wrap = document.getElementById('composite-wrap');
  // Size: make it fit nicely. 8 cols, 4 rows, aspect ~2:1
  const maxW = Math.min(window.innerWidth - 100, 800);
  const cellW = Math.floor(maxW / COLS);
  const cellH = cellW; // square cells
  const totalW = cellW * COLS;
  const totalH = cellH * ROWS;

  let html = '';

  // column labels
  html += '<div class="col-labels" style="width:'+totalW+'px">';
  for (let c = 0; c < COLS; c++) html += `<span>${c+1}</span>`;
  html += '</div>';

  // row labels
  html += '<div class="row-labels" style="height:'+totalH+'px">';
  for (let r = 0; r < ROWS; r++) html += `<span>${String.fromCharCode(65+r)}</span>`;
  html += '</div>';

  html += `<div class="composite-grid" style="width:${totalW}px;height:${totalH}px">`;
  for (let idx = 0; idx < ROWS * COLS; idx++) {
    const item = SEQUENCE[idx];
    const isRest = item.note === 'REST';
    const info = NOTES[item.note];
    html += `<div class="cell${isRest?' rest':''}" data-idx="${idx}" style="width:${cellW}px;height:${cellH}px">
      <span class="cell-label">${isRest ? '—' : info.name}</span>
      <span class="cell-lyric">${item.lyric||''}</span>
    </div>`;
  }
  html += '</div>';
  html += '<div class="caption">MARY HAD A LITTLE LAMB — CHLADNI COMPOSITE SCORE</div>';

  wrap.innerHTML = html;

  // render canvases into cells
  document.querySelectorAll('.cell').forEach((cell, idx) => {
    const canvas = renderCellCanvas(idx, cellW, cellH);
    if (canvas) {
      canvas.style.cssText = 'width:100%;height:100%;display:block;position:absolute;top:0;left:0;';
      cell.style.position = 'relative';
      cell.insertBefore(canvas, cell.firstChild);
    }
    cell.addEventListener('click', () => playSingle(idx));
  });
}

// ── Init ──
renderToolbar();
buildGrid();
window.addEventListener('resize', () => { buildGrid(); });
</script>
</body>
</html>
